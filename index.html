    segWrap.style.cssText = "display:flex;border:1px solid var(--line);border-radius:20px;overflow:hidden";
    [["sym", "符号"], ["name", "名称"]].forEach(function (m) {
      const b = document.createElement("button");
      const on = glyphMode === m[0];
      b.textContent = m[1];
      b.style.cssText = "font-family:inherit;font-size:12px;padding:3px 12px;border:none;cursor:pointer;transition:.15s;" +
        (on ? "background:rgba(var(--accent-rgb),.18);color:var(--gold)" : "background:transparent;color:var(--muted)");
      b.addEventListener("click", function () {
        if (glyphMode === m[0]) return;
        glyphMode = m[0]; saveShow(); ensureToggleBar(); drawWheel();
      });
      segWrap.appendChild(b);
    });
    bar.appendChild(segWrap);
    // 行星设定按钮
    const gear = document.createElement("button");
    gear.textContent = "\u2699 行星设定";
    gear.style.cssText = "font-family:inherit;font-size:12px;padding:3px 12px;border-radius:20px;cursor:pointer;transition:.15s;" +
      (settingsOpen ? "border:1px solid var(--gold-soft);background:rgba(var(--accent-rgb),.16);color:var(--gold)"
                    : "border:1px solid var(--line);background:transparent;color:var(--muted)");
    gear.addEventListener("click", function () {
      settingsOpen = !settingsOpen;
      ensureToggleBar();
    });
    bar.appendChild(gear);
    const hint = document.createElement("span");
    hint.textContent = "左右滑动盘面可切换符号/名称";
    hint.style.cssText = "font-size:10.5px;color:var(--muted);opacity:.7";
    bar.appendChild(hint);
    // 设定面板
    let panel = $("wheelSettings");
    if (!panel) {
      panel = document.createElement("div");
      panel.id = "wheelSettings";
      bar.parentNode.insertBefore(panel, bar.nextSibling);
    }
    panel.style.cssText = "display:" + (settingsOpen ? "block" : "none") +
      ";margin:0 6px 10px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:rgba(var(--accent-rgb),.04)";
    panel.innerHTML = "";
    if (settingsOpen) {
      // 顶部一行:左侧说明,右侧全选按钮(与网格右缘对齐)
      const head = document.createElement("div");
      head.style.cssText = "display:flex;align-items:flex-start;gap:12px;margin-bottom:8px";
      const std = document.createElement("div");
      std.style.cssText = "flex:1;font-size:11.5px;color:var(--muted);line-height:1.6";
      std.textContent = "标准显示(不可关闭):上升 · 太阳 · 月亮 · 水星 金星 火星 木星 土星 天王星 海王星 冥王星";
      head.appendChild(std);
      const allOn = OPT_KEYS.every(function (k) { return wheelShow[k[0]]; });
      const selAll = document.createElement("button");
      selAll.textContent = allOn ? "取消全选" : "全选";
      selAll.style.cssText = "flex:none;font-family:inherit;font-size:12px;padding:3px 14px;border-radius:16px;cursor:pointer;transition:.15s;white-space:nowrap;" +
        (allOn ? "border:1px solid var(--gold-soft);background:rgba(var(--accent-rgb),.16);color:var(--gold)"
               : "border:1px solid var(--line);background:transparent;color:var(--parchment)");
      selAll.addEventListener("click", function () {
        const target = !allOn;
        OPT_KEYS.forEach(function (k) { wheelShow[k[0]] = target; });
        saveShow(); ensureToggleBar(); drawWheel();
      });
      head.appendChild(selAll);
      panel.appendChild(head);
      const grid = document.createElement("div");
      grid.style.cssText = "display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:4px 10px";
      OPT_KEYS.forEach(function (k) {
        const lab = document.createElement("label");
        lab.style.cssText = "display:flex;align-items:center;gap:6px;font-size:12.5px;cursor:pointer;font-weight:500;color:" +
          (wheelShow[k[0]] ? "var(--gold)" : "var(--parchment)");
        const cb = document.createElement("input");
        cb.type = "checkbox"; cb.checked = !!wheelShow[k[0]];
        cb.style.accentColor = "var(--gold)";
        cb.addEventListener("change", function () {
          wheelShow[k[0]] = cb.checked;
          saveShow(); ensureToggleBar(); drawWheel();
        });
        lab.appendChild(cb);
        lab.appendChild(document.createTextNode(k[1]));
        grid.appendChild(lab);
      });
      panel.appendChild(grid);
    }
  }

  // 盘上可见扩展点(逐颗开关;轴线另行呈现,EP 收而不用)
  function visibleExtras() {
    if (!curResult) return [];
    return curResult.extras.filter(function (x) {
      if (x.group === "axes" || x.group === "table-only") return false;
      return !!wheelShow[x.key];
    });
  }

  // ---------- 星盘轮 ----------
  function drawWheel() {
    const svg = $("wheel");
    svg.innerHTML = "";
    if (!curResult) return;
    const res = curResult;

    // 底
    el("circle", { cx: CX, cy: CY, r: R_EDGE, fill: "var(--w-face)", stroke: "var(--line)", "stroke-width": 1.4 }, svg);
    // 黄道带扇区(元素淡彩)
    for (let i = 0; i < 12; i++) {
      const a0 = i * 30, a1 = a0 + 30;
      const [x0, y0] = pt(R_EDGE, a0), [x1, y1] = pt(R_EDGE, a1);
      const [xi1, yi1] = pt(R_ZI, a1), [xi0, yi0] = pt(R_ZI, a0);
      el("path", {
        d: `M ${x0} ${y0} A ${R_EDGE} ${R_EDGE} 0 0 0 ${x1} ${y1} L ${xi1} ${yi1} A ${R_ZI} ${R_ZI} 0 0 1 ${xi0} ${yi0} Z`,
        fill: ELEM_TINT[C.SIGNS[i].elem], "fill-opacity": .18, stroke: "none"
      }, svg);
    }
    el("circle", { cx: CX, cy: CY, r: R_ZI, fill: "none", stroke: "var(--line)", "stroke-width": 1.2 }, svg);
    // 星座分隔 + 符号 + 刻度
    for (let i = 0; i < 12; i++) {
      const lonB = i * 30;
      const [x0, y0] = pt(R_ZI, lonB), [x1, y1] = pt(R_EDGE, lonB);
      el("line", { x1: x0, y1: y0, x2: x1, y2: y1, stroke: "var(--line)", "stroke-width": 1 }, svg);
      const [gx, gy] = pt(276, lonB + 15);
      svg.appendChild(GL.symbolGroup(svgNS, C.SIGNS[i].glyph, gx, gy, 20, "var(--w-sglyph)"));
      // 星座单字名
      const SIGN_CHAR = ["羊", "牛", "双", "蟹", "狮", "处", "秤", "蝎", "射", "摩", "瓶", "鱼"];
      const [zx, zy] = pt(253, lonB + 15);
      const zc = el("text", { x: zx, y: zy + 4.2, "text-anchor": "middle", "font-size": 12, "font-weight": 600, fill: "var(--w-schar)", "font-family": "inherit" }, svg);
      zc.textContent = SIGN_CHAR[i];
      for (let d = 5; d < 30; d += 5) {
        const L = lonB + d, len = (d % 10 === 0) ? 8 : 5;
        const [tx0, ty0] = pt(R_ZI, L), [tx1, ty1] = pt(R_ZI + len, L);
        el("line", { x1: tx0, y1: ty0, x2: tx1, y2: ty1, stroke: "var(--w-cusp)", "stroke-width": .8 }, svg);
      }
    }
    // 内核
    el("circle", { cx: CX, cy: CY, r: R_CORE, fill: "var(--w-core)", "fill-opacity": .75, stroke: "var(--line)", "stroke-width": 1 }, svg);
    const aspLayer = el("g", { "data-layer": "aspects" }, svg); // 相位线专属图层,限定在内核圆盘内

    // 宫头线 + 宫号
    const axes = { 0: "ASC", 3: "IC", 6: "DSC", 9: "MC" };
    for (let i = 0; i < 12; i++) {
      const cl = res.cusps[i];
      const isAxis = (res.system !== "whole") && (i in axes);
      const [x0, y0] = pt(R_CORE, cl), [x1, y1] = pt(R_ZI, cl);
      el("line", {
        x1: x0, y1: y0, x2: x1, y2: y1,
        stroke: isAxis ? "var(--w-axis)" : "var(--w-cusp)", "stroke-width": isAxis ? 2 : 1,
        "data-cusp": i
      }, svg);
      // 宫号(可点击)
      const mid = cl + C.n360(res.cusps[(i + 1) % 12] - cl) / 2;
      const [nx, ny] = pt(168, mid);
      const t = el("text", {
        x: nx, y: ny + 4, "text-anchor": "middle", "font-size": 12,
        fill: "var(--w-hnum)", "font-family": "inherit"
      }, svg);
      t.textContent = i + 1;
    }
    // 四轴线(Whole Sign 下单独画,虚线) + 轴标签
    const axLons = { ASC: res.ang.asc, IC: C.n360(res.ang.mc + 180), DSC: C.n360(res.ang.asc + 180), MC: res.ang.mc };
    for (const k in axLons) {
      if (res.system === "whole") {
        const [x0, y0] = pt(R_CORE, axLons[k]), [x1, y1] = pt(R_ZI, axLons[k]);
        el("line", { x1: x0, y1: y0, x2: x1, y2: y1, stroke: "var(--w-axis)", "stroke-width": 1.6, "stroke-dasharray": "5 4" }, svg);
      }
      const [lx, ly] = pt(R_EDGE + 13, axLons[k]);
      const t = el("text", { x: lx, y: ly + 4, "text-anchor": "middle", "font-size": 12.5, fill: "var(--w-axis)", "font-weight": 700, "letter-spacing": ".05em" }, svg);
      t.textContent = k;
    }

    // ---- 行星与扩展点:合并排布 ----
    const majors = res.planets.map(p => ({ obj: p, isMajor: true }));
    const extras = visibleExtras().map(x => ({ obj: x, isMajor: false }));
    const all = majors.concat(extras).sort((a, b) => C.n360(a.obj.lon - res.ang.asc) - C.n360(b.obj.lon - res.ang.asc));
    // 排布:角度保持真实黄经;拥挤时向内圈分层堆叠(与 astro-seek 一致),
    // 只有同层实在放不下才做很小的角度让位 —— 指引线因此始终短而近似径向
    const RINGS = [R_PL, R_PL - 23, R_PL - 45];
    const disp = [];   // 每颗最终显示角(相对上升点)
    const ringOf = []; // 每颗所在层
    const lastOn = RINGS.map(() => -999); // 各层上一颗的显示角
    all.forEach(function (it, idx) {
      const trueA = C.n360(it.obj.lon - res.ang.asc);
      const need = r => 6.6 * (R_PL / RINGS[r]); // 内层半径小,需要更大角距
      let chosen = -1;
      for (let r = 0; r < RINGS.length; r++) {
        if (trueA - lastOn[r] >= need(r)) { chosen = r; break; }
      }
      if (chosen === -1) {
        // 全部层都挤:选空隙最大的层,并向前做最小角度让位
        let best = 0, bestGap = -1e9;
        for (let r = 0; r < RINGS.length; r++) {
          const gap = trueA - lastOn[r];
          if (gap > bestGap) { bestGap = gap; best = r; }
        }
        chosen = best;
        disp.push(lastOn[chosen] + need(chosen));
      } else {
        disp.push(trueA);
      }
      ringOf.push(chosen);
      lastOn[chosen] = disp[idx];
    });
    const planetScreen = {}; // 主星 key → 内核端点坐标(相位线用)
    all.forEach(function (it, idx) {
      const p = it.obj;
      const aDeg = 180 + disp[idx]; // 屏幕角
      const rPl = RINGS[ringOf[idx]]; // 本颗所在层半径
      // 真位置刻度
      const [m0x, m0y] = pt(R_ZI, p.lon), [m1x, m1y] = pt(R_ZI - 7, p.lon);
      el("line", { x1: m0x, y1: m0y, x2: m1x, y2: m1y, stroke: it.isMajor ? "var(--w-ink)" : "var(--w-tick2)", "stroke-width": it.isMajor ? 1.5 : 1 }, svg);
      const [gx, gy] = ptA(rPl, aDeg);
      // 指引线:内层符号才需要,短而近似径向
      if (ringOf[idx] > 0 || Math.abs(disp[idx] - C.n360(p.lon - res.ang.asc)) > .8) {
        const [lx, ly] = ptA(rPl + (it.isMajor ? 13 : 10), aDeg);
        el("line", {
          x1: m1x, y1: m1y, x2: lx, y2: ly,
          stroke: "var(--w-leader)", "stroke-width": .8, "stroke-opacity": .5
        }, svg);
      }
      const color = it.isMajor ? "var(--w-ink)" : "var(--w-sub)";
      const size = it.isMajor ? 19 : 14;
      const grp = el("g", { cursor: "pointer", "data-planet": p.key }, svg);
      if (glyphMode === "name" && NAME1[p.key]) {
        const t = el("text", { x: gx, y: gy + (it.isMajor ? 5 : 4), "text-anchor": "middle", "font-size": it.isMajor ? 15 : 12, "font-weight": 700, fill: color, "font-family": "inherit" }, grp);
        t.textContent = NAME1[p.key];
      } else if (p.glyphKey) {
        grp.appendChild(GL.symbolGroup(svgNS, p.glyphKey, gx, gy, size, color));
      } else {
        const t = el("text", { x: gx, y: gy + 3.6, "text-anchor": "middle", "font-size": it.isMajor ? 13 : 10, "font-weight": 700, fill: color, "font-family": "inherit" }, grp);
        t.textContent = p.glyphTxt || p.name;
      }
      // 逆行小标
      if (p.retro) {
        const rt = el("text", { x: gx + size * .62, y: gy + size * .55, "text-anchor": "start", "font-size": 8.5, fill: "var(--w-retro)", "font-family": "inherit" }, grp);
        rt.textContent = "℞";
      }
      // 透明热区
      el("circle", { cx: gx, cy: gy, r: 13, fill: "transparent" }, grp);
      grp.addEventListener("click", function () { it.isMajor ? openPlanet(p) : openExtra(p); });
      if (it.isMajor) planetScreen[p.key] = pt(R_CORE - 3, p.lon);
    });

    // 相位线:九步口径(合8/冲8/刑6/拱6/六合4),按类型分色,越紧越显;行星永远盖在线上
    const NA = (typeof curNine !== "undefined" && curNine && curNine.step7) ? curNine.step7.allAspects : null;
    const ASP_LINE = {
      opp: { color: "#c0392b", dash: null, max: 8 },   // 冲:深红
      squ: { color: "#d9662a", dash: null, max: 6 },   // 刑:橙
      tri: { color: "#2e6fb0", dash: null, max: 6 },   // 拱:蓝
      sex: { color: "#3f9e63", dash: "3 3", max: 4 }   // 六合:绿虚线
      // 合相不画线:两星本就相邻
    };
    const endDots = {};
    if (NA) {
      NA.slice().sort((x, y) => y.orb - x.orb).forEach(function (asp) {
        const st = ASP_LINE[asp.type];
        if (!st) return;
        const a = planetScreen[asp.a], b = planetScreen[asp.b];
        if (!a || !b) return;
        const tight = Math.max(0, 1 - asp.orb / st.max);
        const attrs = {
          x1: a[0], y1: a[1], x2: b[0], y2: b[1],
          stroke: st.color,
          "stroke-width": (0.8 + tight * 1.0).toFixed(2),
          "stroke-opacity": (0.3 + tight * 0.52).toFixed(2),
          "stroke-linecap": "round",
          "data-aspline": asp.a + "-" + asp.b
        };
        if (st.dash) attrs["stroke-dasharray"] = st.dash;
        el("line", attrs, aspLayer);
        endDots[asp.a] = a; endDots[asp.b] = b;
      });
    }
    Object.keys(endDots).forEach(function (k) {
      const d = endDots[k];
      el("circle", { cx: d[0], cy: d[1], r: 1.8, fill: "var(--w-aspdot)", "fill-opacity": .8 }, aspLayer);
    });
  }

  // 引导高亮:keys=null 恢复;否则淡化非 keys 的行星
  function highlightPlanets(keys) {
    const svg = $("wheel");
    svg.querySelectorAll("[data-planet]").forEach(function (g) {
      if (!keys) { g.classList.remove("dimmed"); return; }
      g.classList.toggle("dimmed", !keys.includes(g.getAttribute("data-planet")));
    });
    svg.querySelectorAll("[data-aspline]").forEach(function (l) {
      if (!keys) { l.classList.remove("dimmed"); return; }
      const [a, b] = l.getAttribute("data-aspline").split("-");
      l.classList.toggle("dimmed", !(keys.includes(a) && keys.includes(b)));
    });
  }

  // ---------- 分组位置表 ----------
  function glyphCell(o, px, color) {
    if (o.glyphKey) return GL.symbolSVG(o.glyphKey, px, color);
    return '<span style="font-family:inherit;font-weight:700;font-size:12px;color:' + color + '">' + (o.glyphTxt || "") + "</span>";
  }
  function drawPosTable() {
    const res = curResult, tb = $("posTable");
    tb.innerHTML = "";
    if (!res) return;
    const rows = res.planets.map(function (p) {
      return "<tr><td style='padding:5px 10px 5px 0;width:34px'>" + glyphCell(p, 20, "var(--w-sglyph)") + "</td>" +
             "<td style='padding:5px 8px 5px 0'>" + p.name + "</td>" +
             "<td style='padding:5px 8px 5px 0;color:var(--gold-soft)'>" + p.sign + "</td>" +
             "<td style='padding:5px 0;text-align:right;width:44px;white-space:nowrap;font-variant-numeric:tabular-nums'>" + p.house + "宫</td></tr>";
    });
    const ascIdx = Math.floor(((res.ang.asc % 360) + 360) % 360 / 30);
    rows.push("<tr><td style='padding:5px 10px 5px 0;text-align:center;font-weight:700;color:var(--w-axis)'>ASC</td>" +
              "<td style='padding:5px 8px 5px 0'>上升</td>" +
              "<td style='padding:5px 8px 5px 0;color:var(--gold-soft)'>" + C.SIGNS[ascIdx].name + "</td>" +
              "<td style='padding:5px 0;text-align:right;white-space:nowrap'>—</td></tr>");
    tb.innerHTML = rows.join("");
  }
  function openDrawer(html) {
    $("drawerBody").innerHTML = html;
    $("drawer").classList.add("open");
    $("scrim").classList.add("show");
  }
  function closeDrawer() {
    $("drawer").classList.remove("open");
    $("scrim").classList.remove("show");
  }
  function sec(title, body) {
    return '<div class="d-section"><p class="eyebrow">' + title + '</p><div class="d-text">' + body + "</div></div>";
  }
  function loreSecs(key) {
    const L = X.LORE[key];
    if (!L) return "";
    return sec("神话原型", L.myth) + sec("掌管主题", L.rule) + sec("心理意义", L.psy) + sec("专题应用", L.app);
  }

  function openPlanet(p) {
    const res = curResult;
    let chips = '<div class="chips">';
    if (p.retro) chips += '<span class="chip" style="color:var(--fire)">逆行 ℞</span>';
    chips += "</div>";
    const rel = res.aspects.filter(a => res.planets[a.a].key === p.key || res.planets[a.b].key === p.key);
    const aspHtml = rel.length ? rel.map(function (a) {
      const other = res.planets[a.a].key === p.key ? res.planets[a.b] : res.planets[a.a];
      return '<span style="color:' + a.color + '">' + a.glyph + "</span> " + a.name + " " + other.name;
    }).join("<br>") : "无主要相位";
    const note = (window.NineSteps && typeof curNine !== "undefined" && curNine) ? window.NineSteps.planetNote(curNine, p.key) : "";
    openDrawer(
      '<div class="d-glyph">' + glyphCell(p, 40, "#a8792a") + "</div>" +
      '<div class="d-title">' + p.name + " · " + p.sign + "</div>" +
      '<div class="d-kw">' + p.kw + (p.retro ? " · 逆行" : "") + "</div>" +
      chips +
      (note ? sec("在你的盘中", note) : "") +
      sec("本盘相位", aspHtml)
    );
  }
  function openExtra(x) {
    const noteChip = x.note ? '<span class="chip" style="color:var(--gold-soft)">' + x.note + "</span>" : "";
    let erisHtml = "";
    if (x.key === "Eris" && x.trigger) {
      erisHtml = sec("触发判定", x.trigger.length
        ? "与个人行星存在 2° 内紧密相位(" + x.trigger.join("、") + "),此点在你盘中被激活,值得纳入解读。"
        : "未与个人行星形成 2° 内紧密相位:默认仅作背景,不必强行解读。");
    }
    openDrawer(
      '<div class="d-glyph">' + glyphCell(x, 40, "#a8792a") + "</div>" +
      '<div class="d-title">' + x.name + " · " + x.sign + "</div>" +
      '<div class="d-kw">' + (x.house ? "落第 " + x.house + " 宫" : "") + (x.retro ? " · 逆行" : "") + "</div>" +
      '<div class="chips">' + noteChip + "</div>" +
      erisHtml +
      loreSecs(x.key)
    );
  }

  function openAspect(a) {
    const res = curResult;
    const p1 = res.planets[a.a], p2 = res.planets[a.b];
    openDrawer(
      '<div class="d-glyph" style="color:' + a.color + '">' + a.glyph + "</div>" +
      '<div class="d-title">' + p1.name + " " + a.name + " " + p2.name + "</div>" +
      '<div class="d-kw">' + a.angle + "° · 容许度 " + a.orb.toFixed(1) + "° · " + a.tone + "</div>" +
      sec("相位含义", C.MEANINGS.aspects[a.type]) +
      sec("这组组合", p1.name + "(" + p1.kw + ")与" + p2.name + "(" + p2.kw + ")以" + a.name + "连接:" +
        (a.tone === "和谐" ? "两股能量互相顺水推舟,是可依赖的内在资源。" :
         a.tone === "张力" ? "两股能量互相牵制,带来反复出现的课题,也是成长最快的引擎。" :
         "两股能量融为一体,彼此放大,需留意主导权。") +
        " 容许度越小(此处 " + a.orb.toFixed(1) + "°),体感越明显。")
    );
  }

  // ---------- 主视图 ----------
  let curNine = null;
  function drawActive() {
    const c = activeChart();
    if (!c) {
      $("emptyState").style.display = "";
      $("chartView").style.display = "none";
      curResult = null;
      return;
    }
    $("emptyState").style.display = "none";
    $("chartView").style.display = "";
    curResult = computeFor(c);
    $("ctNick").textContent = c.nick;
    $("ctMeta").textContent = c.date + " " + c.time + "(UTC+8) · " + c.lat.toFixed(2) + "°, " + c.lon.toFixed(2) + "° · " + (c.sys === "whole" ? "Whole Sign" : "Placidus");
    document.querySelectorAll("#sysSeg button").forEach(function (b) {
      b.classList.toggle("on", (c.sys || "placidus") === b.dataset.sys);
    });
    // 九步先算(盘面相位线与解读都依赖)
    try { curNine = window.NineSteps.compute(curResult, curResult.extras, c.lat); }
    catch (e) { curNine = null; }
    ensureToggleBar();
    drawWheel();
    drawPosTable();
    renderReading();
  }

  // 解读面板:有完整解读显示五章,否则显示本地简版
  function renderReading() {
    const c = activeChart(), body = $("nineBody");
    if (!c || !curNine) { body.innerHTML = ""; return; }
    if (c.reading && c.reading.chapters) {
      window.NineSteps.renderChapters(c.reading.chapters, body);
      $("readState").textContent = "完整版 · " + (c.reading.ts || "");
      $("genRead").textContent = "重新生成";
    } else {
      window.NineSteps.render(curNine, body);
      $("readState").textContent = "简版(自动生成) · 点「生成完整解读」获得五章全文";
      $("genRead").textContent = "生成完整解读";
    }
  }

  // ---------- 初始化 ----------
  function init() {
    initForm();
    initThemeMusic();
    // —— 解读面板按钮 ——
    function copyText(txt, btn, okLabel) {
      function done() { const t = btn.textContent; btn.textContent = okLabel; setTimeout(function () { btn.textContent = t; }, 1800); }
      function fallback() {
        const ta = document.createElement("textarea");
        ta.value = txt; document.body.appendChild(ta); ta.select();
        try { document.execCommand("copy"); done(); } catch (e) { }
        document.body.removeChild(ta);
      }
      if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(txt).then(done, fallback);
      else fallback();
    }
    $("nineCopyPrompt").addEventListener("click", function () {
      if (!curNine) return;
      copyText(window.NineSteps.buildPrompt(curNine, curResult), this, "已复制 ✓ 贴给 AI 后把结果粘回来");
    });
    $("pasteRead").addEventListener("click", function () {
      const box = $("pasteBox");
      box.style.display = box.style.display === "none" ? "" : "none";
    });
    $("pasteSave").addEventListener("click", function () {
      const chs = window.NineSteps.parseChapters($("pasteTa").value);
      if (!chs) { $("pasteTa").placeholder = "解析失败:请确认包含「第一章…第五章」标题或为 JSON 格式"; $("pasteTa").value = ""; return; }
      const c = activeChart();
      if (!c) return;
      c.reading = { chapters: chs, ts: new Date().toISOString().slice(0, 10) };
      saveStore();
      $("pasteTa").value = ""; $("pasteBox").style.display = "none";
      renderReading();
    });
    $("genRead").addEventListener("click", function () {
      const btn = this, c = activeChart();
      if (!c || !curNine) return;
      if (!window.NineSteps.hasSupabase()) {
        // 未配置 Supabase:引导走复制/粘贴流程
        copyText(window.NineSteps.buildPrompt(curNine, curResult), btn, "未接 API:提示词已复制,贴给 AI 后用「粘贴 AI 解读」");
        $("pasteBox").style.display = "";
        return;
      }
      btn.disabled = true; btn.textContent = "生成中…(约 1–2 分钟)";
      window.NineSteps.fetchReading(curNine, curResult).then(function (chs) {
        c.reading = { chapters: chs, ts: new Date().toISOString().slice(0, 10) };
        saveStore();
        btn.disabled = false;
        renderReading();
      }).catch(function (e) {
        btn.disabled = false; btn.textContent = "生成失败,重试";
        $("readState").textContent = "生成失败:" + e.message;
      });
    });
    // 视口跨过断点时按当前模式重排章节
    let lastApp = window.innerWidth < 760;
    window.addEventListener("resize", function () {
      const nowApp = window.innerWidth < 760;
      if (nowApp !== lastApp) { lastApp = nowApp; renderReading(); }
    });
    $("posHead").addEventListener("click", function () {
      const tb = $("posTable");
      const closed = tb.style.display === "none";
      tb.style.display = closed ? "" : "none";
      $("posArrow").textContent = closed ? "\u2227" : "\u2228";
    });
    document.querySelectorAll("#sysSeg button").forEach(function (b) {
      b.addEventListener("click", function () {
        const c = activeChart();
        if (!c) return;
        c.sys = b.dataset.sys;
        saveStore(); drawActive();
      });
    });
    $("drawerX").addEventListener("click", closeDrawer);
    $("scrim").addEventListener("click", closeDrawer);
    document.addEventListener("keydown", function (e) { if (e.key === "Escape") closeDrawer(); });
    $("accNote").textContent = "主星与 Swiss Ephemeris 同精度 · 小天体 ±0.5°";
    renderChartList();
    drawActive();
  }
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", init);
  else init();
})();

</script>
</body>
</html>
